services:
  edgenode:
    image: ghcr.io/holo-host/edgenode:latest
    container_name: card-holochain-conductor
    ports:
      - "4444:4444"
      - "3001:3001"
    volumes:
      - holo-data:/data
      - ./workdir/card-holochain.happ:/happs/card-holochain.happ
    restart: unless-stopped

  bridge:
    build: ./bridge
    container_name: card-holochain
    network_mode: "service:edgenode"
    depends_on:
      - edgenode
    environment:
      - CONDUCTOR_ADMIN_URL=ws://localhost:4444
      - PORT=3001
    volumes:
      - ./ui:/ui
    restart: unless-stopped

volumes:
  holo-data:
